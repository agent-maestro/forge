name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Rust toolchain is needed for the cross-target equivalence
      # tests under tests/equivalence/ and for the rust-backend
      # cargo-check pass under software/backends/tests/.
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            software/runtime/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff, advisory)
        continue-on-error: true
        run: ruff check .

      - name: Type check (mypy, advisory)
        continue-on-error: true
        run: mypy lang/ software/ hardware/ tools/

      - name: Pytest (full suite)
        run: |
          pytest -q --tb=short

  # ── Optional Verilator job ──
  # Verilator-skipped tests light up here. Keep it on Linux only;
  # Verilator on Windows is more trouble than it's worth for CI.
  verilator:
    name: ubuntu-latest / verilator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Verilator + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator build-essential

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest (HW-simulation paths only)
        run: |
          pytest -q --tb=short \
            hardware/modules/transcendental/tests/ \
            hardware/simulation/tests/
