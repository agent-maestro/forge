name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Opt into Node 24 for all JavaScript-based actions (checkout,
# setup-python, cache, etc.) so we don't get the Node-20-deprecation
# warning that's slated to start failing builds on 2026-06-02.
# Documented in
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Rust toolchain is needed for the cross-target equivalence
      # tests under tests/equivalence/ and for the rust-backend
      # cargo-check pass under software/backends/tests/.
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            software/runtime/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Python deps
        # `[lsp]` extra pulls pygls + lsprotocol so
        # tests/integration/test_lsp_hover.py can import the LSP
        # server module without ModuleNotFoundError at collect time.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,lsp]"

      - name: Lint (ruff, advisory)
        continue-on-error: true
        run: ruff check .

      - name: Type check (mypy, advisory)
        continue-on-error: true
        run: mypy lang/ software/ hardware/ tools/

      - name: Pytest (full suite, excludes slow ZK proof tests)
        # `-m 'not slow'` skips cargo-build + Plonky2 proof generation.
        # Run those nightly with `pytest -m slow` after the prover
        # crate is built via cargo build --release.
        run: |
          pytest -q --tb=short -m "not slow"

  # ── Optional Verilator job ──
  # Verilator-skipped tests light up here. Keep it on Linux only;
  # Verilator on Windows is more trouble than it's worth for CI.
  verilator:
    name: ubuntu-latest / verilator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Verilator + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator build-essential

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest (HW-simulation + external-lint paths)
        run: |
          pytest -q --tb=short \
            hardware/modules/transcendental/tests/ \
            hardware/simulation/tests/ \
            tools/external_lint/tests/
