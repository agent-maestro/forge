name: FPGA Simulation

on:
  push:
    branches: [master]
    paths:
      - "hardware/**"
      - "lang/**"
      - "tests/equivalence/**"
      - ".github/workflows/fpga-sim.yml"
  pull_request:
    paths:
      - "hardware/**"
      - ".github/workflows/fpga-sim.yml"
  # Manual trigger from the Actions UI -- useful when only the
  # workflow file or a Verilator-related dep changes and the
  # paths filter above wouldn't otherwise fire it.
  workflow_dispatch:

# Opt into Node 24 for all JavaScript-based actions so the
# deprecation banner stops firing on every run. See
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verilator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Verilator-aware test paths. The dedicated `tests/integration/
      # test_verilog_output.py` and the `-k hw_sw` filter referenced
      # by the previous version of this workflow no longer exist;
      # the actual hardware-simulation suite lives under
      # hardware/{simulation,modules}/tests/.
      - name: Pytest (HW-simulation paths)
        run: |
          pytest -q --tb=short \
            hardware/simulation/tests/ \
            hardware/modules/transcendental/tests/
      - name: Pytest (HDL backend tests)
        run: |
          pytest -q --tb=short hardware/hdl_gen/tests/
